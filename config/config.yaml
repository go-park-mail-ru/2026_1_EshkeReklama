http_server:
  listen: ":8000"
  read_timeout: 15s
  write_timeout: 15s

postgres:
  host: ${POSTGRES_HOST}
  port: 5432
  database: ${POSTGRES_DB}
  username: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}

graceful_timeout: 20s

cors:
  allowed_origins:
    - "http://localhost:5501"
    - "http://127.0.0.1:5501"