http_server:
  listen: ":8000"
  read_timeout: 15s
  write_timeout: 15s

postgres:
  host: ${POSTGRES_HOST}
  port: 5432
  database: ${POSTGRES_DB}
  username: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}

graceful_timeout: 20s

redis:
  host: ${REDIS_HOST}
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0

session:
  ttl: 24h
  cookie_name: "session_id"
  cookie_path: "/"
  cookie_secure: false

cors:
  allowed_origins:
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"
    - "http://212.233.96.112:8080"
