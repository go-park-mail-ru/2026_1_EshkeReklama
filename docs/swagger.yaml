basePath: /
definitions:
  httpx.Error:
    properties:
      error:
        type: string
      status:
        type: string
    type: object
  internal.AdResponse:
    properties:
      id:
        type: integer
      price:
        type: integer
      target_action:
        type: string
      title:
        type: string
    type: object
  internal.ListAdsResponse:
    properties:
      ads:
        items:
          $ref: '#/definitions/internal.AdResponse'
        type: array
      advertiser_id:
        type: integer
    type: object
  internal.LoginRequest:
    properties:
      identifier:
        type: string
      password:
        type: string
    type: object
  internal.LoginResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      phone:
        type: string
    type: object
  internal.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
  internal.RegisterResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      phone:
        type: string
    type: object
host: localhost:8000
info:
  contact: {}
  description: API для управления рекламодателями и их рекламными кампаниями.
  title: Eshke Reklama API
  version: "1.0"
paths:
  /ads:
    get:
      description: Возвращает список всех кампаний текущего рекламодателя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal.ListAdsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpx.Error'
      security:
      - CookieAuth: []
      summary: Список рекламных кампаний
      tags:
      - ads
  /advertiser/login:
    post:
      consumes:
      - application/json
      description: Аутентифицирует рекламодателя по email или телефону и паролю
      parameters:
      - description: Данные для входа
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal.LoginResponse'
        "400":
          description: Invalid identifier или password
          schema:
            $ref: '#/definitions/httpx.Error'
      summary: Вход рекламодателя
      tags:
      - advertiser
  /advertiser/logout:
    post:
      description: Завершает сессию текущего рекламодателя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - CookieAuth: []
      summary: Выход рекламодателя
      tags:
      - advertiser
  /advertiser/register:
    post:
      consumes:
      - application/json
      description: Создает новый аккаунт и открывает сессию
      parameters:
      - description: Данные для регистрации
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/internal.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal.RegisterResponse'
        "400":
          description: Invalid request или User already exists
          schema:
            $ref: '#/definitions/httpx.Error'
      summary: Регистрация рекламодателя
      tags:
      - advertiser
securityDefinitions:
  CookieAuth:
    in: cookie
    name: session_id
    type: apiKey
swagger: "2.0"
