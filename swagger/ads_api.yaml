openapi: 3.0.3
info:
  title: Ads Service API
  version: 1.2.0
  description: Minimal API for advertising service with session-based auth

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
  - name: Ads

paths:
  /auth/register:
    post:
      summary: Register user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login by email or phone and password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: User logged in
          headers:
            Set-Cookie:
              description: Session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/oauth/{provider}:
    post:
      summary: Login or register via social provider
      tags:
        - Auth
      parameters:
        - name: provider
          in: path
          required: true
          description: OAuth provider
          schema:
            type: string
            enum:
              - vk
              - google
              - yandex
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthLoginRequest'
      responses:
        '200':
          description: User authenticated via provider
          headers:
            Set-Cookie:
              description: Session cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid social auth data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Logout user
      tags:
        - Auth
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ads:
    get:
      summary: List ads
      tags:
        - Ads
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of ads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdsListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - phone
        - password
      properties:
        email:
          type: string
          format: email
          example: ivan@example.com
        phone:
          type: string
          example: "+79991234567"
        password:
          type: string
          format: password
          example: strongpassword123

    LoginRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          description: Email or phone
          example: ivan@example.com
        password:
          type: string
          format: password
          example: strongpassword123

    OAuthLoginRequest:
      type: object
      required:
        - access_token
      properties:
        access_token:
          type: string
          description: Provider access token from VK, Google or Yandex ID
          example: eyJhbGciOi...
        code:
          type: string
          description: Optional authorization code if code flow is used
          example: 4/0AVMBsJ...
        redirect_uri:
          type: string
          format: uri
          example: http://localhost:3000/auth/callback

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: ivan@example.com
        phone:
          type: string
          example: "+79991234567"
        created_at:
          type: string
          format: date-time
          example: '2026-03-07T12:00:00Z'

    Ad:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: iPhone 14
        description:
          type: string
          example: Used phone in excellent condition
        price:
          type: number
          example: 70000
        created_at:
          type: string
          format: date-time
          example: '2026-03-07T12:00:00Z'

    UserResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/User'

    AdsListResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        data:
          type: array
          items:
            $ref: '#/components/schemas/Ad'

    MessageResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        data:
          type: string
          example: success

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          example: unauthorized
